      <text x="48" y="143" fill="#64748b">    "stack"     :</text><text x="206" y="143" fill="#fbbf24"> ["Python", "FastAPI", "LangChain", "FAISS", "React"]</text><text x="672" y="143" fill="#64748b">,</text>
